# Lab 01 — Standalone: Zabbix infrastructure monitoring in isolation
# Includes: MySQL, zabbix-server, zabbix-web (Nginx).
# Access web UI at http://localhost:8403 (admin / zabbix)
---
name: it-stack-zabbix-lab01

services:

  zabbix-s01-db:
    image: mysql:8.0
    container_name: zabbix-s01-db
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_bin --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: zabbix_root_lab
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbix_lab_password
    volumes:
      - zabbix-s01-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uzabbix", "-pzabbix_lab_password"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 60s
    networks:
      - zabbix-s01-net

  zabbix-s01-server:
    image: zabbix/zabbix-server-mysql:ubuntu-7.0-latest
    container_name: zabbix-s01-server
    restart: unless-stopped
    depends_on:
      zabbix-s01-db:
        condition: service_healthy
    environment:
      DB_SERVER_HOST: zabbix-s01-db
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbix_lab_password
      MYSQL_ROOT_PASSWORD: zabbix_root_lab
      ZBX_TIMEOUT: 30
      ZBX_STARTPINGERS: 1
    ports:
      - "10051:10051"
    volumes:
      - zabbix-s01-alertscripts:/usr/lib/zabbix/alertscripts
      - zabbix-s01-externalscripts:/usr/lib/zabbix/externalscripts
    healthcheck:
      test: ["CMD-SHELL", "zabbix_server --version > /dev/null 2>&1 && echo ok || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    networks:
      - zabbix-s01-net

  zabbix-s01-web:
    image: zabbix/zabbix-web-nginx-mysql:ubuntu-7.0-latest
    container_name: zabbix-s01-web
    restart: unless-stopped
    depends_on:
      zabbix-s01-db:
        condition: service_healthy
      zabbix-s01-server:
        condition: service_started
    environment:
      ZBX_SERVER_HOST: zabbix-s01-server
      ZBX_SERVER_PORT: "10051"
      DB_SERVER_HOST: zabbix-s01-db
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbix_lab_password
      PHP_TZ: UTC
      ZBX_SERVER_NAME: "IT-Stack Zabbix Lab01"
    ports:
      - "8403:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ | grep -qi 'zabbix|login' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 120s
    networks:
      - zabbix-s01-net

networks:
  zabbix-s01-net:
    driver: bridge

volumes:
  zabbix-s01-db-data:
  zabbix-s01-alertscripts:
  zabbix-s01-externalscripts:
